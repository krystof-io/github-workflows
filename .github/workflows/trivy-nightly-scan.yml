name: Nightly Trivy Security Scan

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan Container Images
    runs-on: arc-runners-javadev
    steps:
      - name: Checkout config
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5
        with:
          sparse-checkout: config
          sparse-checkout-cone-mode: true

      - name: Login to container registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef #v3.6.0
        with:
          registry: ${{ vars.IMAGE_REGISTRY_HOST }}
          username: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
          password: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}

      - name: Pull Trivy image
        run: docker pull ${{ vars.DOCKER_PROXY_HOST }}/aquasec/trivy:latest

      - name: Create Trivy cache directory
        run: mkdir -p ${{ runner.temp }}/trivy-cache

      - name: Scan all application images
        env:
          REGISTRY: ${{ vars.IMAGE_REGISTRY_HOST }}
          REG_USERNAME: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
          REG_PASSWORD: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}
          TRIVY_IMAGE: ${{ vars.DOCKER_PROXY_HOST }}/aquasec/trivy:latest
          TRIVY_CACHE: ${{ runner.temp }}/trivy-cache
          GHCR_PROXY: ${{ vars.GHCR_PROXY_HOST }}
          SEVERITY: CRITICAL,HIGH
        run: |
          AUTH=$(echo -n "${REG_USERNAME}:${REG_PASSWORD}" | base64)
          APPS=$(yq -r '.apps[]' config/trivy-apps.yml)
          APP_COUNT=$(echo "$APPS" | wc -l)

          DETAILS=""
          SUMMARY_ROWS=""
          FIRST_APP=true
          TOTAL_ALL=0
          TOTAL_CRITICAL=0
          TOTAL_HIGH=0
          APPS_WITH_VULNS=0
          APPS_CLEAN=0
          APPS_FAILED=0

          for APP in $APPS; do
            echo "::group::Scanning ${APP}"

            # Discover latest tag
            RESPONSE=$(curl -sf -H "Authorization: Basic ${AUTH}" \
              "https://${REGISTRY}/v2/krystof-io/${APP}/tags/list" 2>/dev/null) || true
            TAG=$(echo "$RESPONSE" | jq -r '.tags[]' 2>/dev/null | sort -V | tail -1)

            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "::warning::No tags found for ${APP}"
              SUMMARY_ROWS+="| :grey_question: | ${APP} | _no tags found_ | - | - | - |"$'\n'
              APPS_FAILED=$((APPS_FAILED + 1))
              echo "::endgroup::"
              continue
            fi

            IMAGE_REF="${REGISTRY}/krystof-io/${APP}:${TAG}"
            echo "Scanning ${IMAGE_REF}"

            # Skip DB download after first app (cache is warm)
            SKIP_FLAGS=""
            if [ "$FIRST_APP" = "false" ]; then
              SKIP_FLAGS="--skip-db-update --skip-java-db-update"
            fi
            FIRST_APP=false

            # Run Trivy with JSON output
            set +e
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$HOME/.docker/config.json":/root/.docker/config.json:ro \
              -v "${TRIVY_CACHE}":/root/.cache/trivy \
              -e TRIVY_DB_REPOSITORY="${GHCR_PROXY}/aquasecurity/trivy-db" \
              -e TRIVY_JAVA_DB_REPOSITORY="${GHCR_PROXY}/aquasecurity/trivy-java-db" \
              "${TRIVY_IMAGE}" \
              image --severity "${SEVERITY}" --scanners vuln \
              ${SKIP_FLAGS} \
              --format json "${IMAGE_REF}" > "/tmp/${APP}-results.json"
            SCAN_EXIT=$?
            set -e

            if [ $SCAN_EXIT -ne 0 ] || [ ! -s "/tmp/${APP}-results.json" ]; then
              echo "::warning::Scan failed for ${APP}"
              SUMMARY_ROWS+="| :x: | ${APP} | \`${TAG}\` | _scan failed_ | - | - |"$'\n'
              APPS_FAILED=$((APPS_FAILED + 1))
              echo "::endgroup::"
              continue
            fi

            # Count vulnerabilities by severity
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "/tmp/${APP}-results.json")
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "/tmp/${APP}-results.json")
            APP_TOTAL=$((CRITICAL + HIGH))
            TOTAL_ALL=$((TOTAL_ALL + APP_TOTAL))
            TOTAL_CRITICAL=$((TOTAL_CRITICAL + CRITICAL))
            TOTAL_HIGH=$((TOTAL_HIGH + HIGH))

            # Determine status icon and build summary row
            if [ "$CRITICAL" -gt 0 ]; then
              ICON=":red_circle:"
              APPS_WITH_VULNS=$((APPS_WITH_VULNS + 1))
              SUMMARY_ROWS+="| ${ICON} | **${APP}** | \`${TAG}\` | **${CRITICAL}** | ${HIGH} | **${APP_TOTAL}** |"$'\n'
            elif [ "$HIGH" -gt 0 ]; then
              ICON=":orange_circle:"
              APPS_WITH_VULNS=$((APPS_WITH_VULNS + 1))
              SUMMARY_ROWS+="| ${ICON} | **${APP}** | \`${TAG}\` | ${CRITICAL} | **${HIGH}** | **${APP_TOTAL}** |"$'\n'
            else
              ICON=":green_circle:"
              APPS_CLEAN=$((APPS_CLEAN + 1))
              SUMMARY_ROWS+="| ${ICON} | ${APP} | \`${TAG}\` | ${CRITICAL} | ${HIGH} | ${APP_TOTAL} |"$'\n'
            fi

            # Build collapsible detail section for apps with vulnerabilities
            if [ "$APP_TOTAL" -gt 0 ]; then
              VULN_TABLE=$(jq -r '
                [.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
                | sort_by(if .Severity == "CRITICAL" then 0 else 1 end)
                | .[]
                | "| \(.VulnerabilityID) | \(if .Severity == "CRITICAL" then ":red_circle: CRITICAL" else ":orange_circle: HIGH" end) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "n/a") | \((.Title // "No description") | gsub("\\|"; "/") | .[:80]) |"
              ' "/tmp/${APP}-results.json")

              DETAILS+="<details>"$'\n'
              DETAILS+="<summary><strong>${APP}</strong> &mdash; ${APP_TOTAL} vulnerabilities (${CRITICAL} critical, ${HIGH} high)</summary>"$'\n'
              DETAILS+=$'\n'
              DETAILS+="| CVE | Severity | Package | Installed | Fixed | Description |"$'\n'
              DETAILS+="|-----|----------|---------|-----------|-------|-------------|"$'\n'
              DETAILS+="${VULN_TABLE}"$'\n'
              DETAILS+=$'\n'"</details>"$'\n\n'
            fi

            echo "::endgroup::"
          done

          # Build the full summary
          {
            echo "# :shield: Trivy Nightly Security Scan"
            echo ""
            echo "> **$(date -u '+%Y-%m-%d %H:%M UTC')** | Severity filter: \`${SEVERITY}\` | **${APP_COUNT}** images scanned"
            echo ""

            # Status callout
            if [ "$TOTAL_CRITICAL" -gt 0 ]; then
              echo "> [!CAUTION]"
              echo "> **${TOTAL_ALL} vulnerabilities** found across **${APPS_WITH_VULNS}** of **${APP_COUNT}** applications (${TOTAL_CRITICAL} critical, ${TOTAL_HIGH} high)"
            elif [ "$TOTAL_HIGH" -gt 0 ]; then
              echo "> [!WARNING]"
              echo "> **${TOTAL_ALL} vulnerabilities** found across **${APPS_WITH_VULNS}** of **${APP_COUNT}** applications (${TOTAL_HIGH} high)"
            else
              echo "> [!NOTE]"
              echo "> No vulnerabilities found across **${APP_COUNT}** applications"
            fi

            echo ""
            echo "## Overview"
            echo ""
            echo "| Status | Application | Image Tag | Critical | High | Total |"
            echo "|:------:|-------------|-----------|:--------:|:----:|:-----:|"
            echo -n "${SUMMARY_ROWS}"

            if [ "$APPS_WITH_VULNS" -gt 0 ] || [ "$APPS_FAILED" -gt 0 ]; then
              echo "| | | **Totals** | **${TOTAL_CRITICAL}** | **${TOTAL_HIGH}** | **${TOTAL_ALL}** |"
            fi

            echo ""

            # Details section
            if [ -n "$DETAILS" ]; then
              echo "## Vulnerability Details"
              echo ""
              echo "${DETAILS}"
            fi

            # Legend
            echo "---"
            echo ""
            echo "<sub>"
            echo ""
            echo ":green_circle: No vulnerabilities &nbsp; :orange_circle: High severity &nbsp; :red_circle: Critical severity &nbsp; :grey_question: No image found &nbsp; :x: Scan failed"
            echo ""
            echo "</sub>"
          } >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "Scan complete. Total vulnerabilities found: ${TOTAL_ALL}"
