name: Nightly Trivy Security Scan

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover-clusters:
    name: Discover Clusters
    runs-on: arc-runners-javadev
    outputs:
      matrix: ${{ steps.clusters.outputs.matrix }}
    steps:
      - name: Checkout config
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5
        with:
          sparse-checkout: config
          sparse-checkout-cone-mode: true

      - name: Build cluster matrix
        id: clusters
        run: |
          MATRIX=$(yq -o=json '[.clusters | to_entries[] | {"name": .key, "cluster_url": .value.cluster_url}]' config/clusters.yml | jq -c)
          echo "matrix={\"include\":${MATRIX}}" >> $GITHUB_OUTPUT
          echo "Clusters: ${MATRIX}"

  scan:
    name: Scan Application Images
    runs-on: arc-runners-javadev
    steps:
      - name: Checkout config
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5
        with:
          sparse-checkout: config
          sparse-checkout-cone-mode: true

      - name: Login to container registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef #v3.6.0
        with:
          registry: ${{ vars.IMAGE_REGISTRY_HOST }}
          username: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
          password: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}

      - name: Pull Trivy image
        run: docker pull ${{ vars.DOCKER_PROXY_HOST }}/aquasec/trivy:latest

      - name: Create Trivy cache directory
        run: mkdir -p ${{ runner.temp }}/trivy-cache

      - name: Discover deployed images from GitOps repos
        env:
          CICD_TOKEN: ${{ secrets.CICD_TOKEN }}
        run: |
          CLUSTERS=$(yq -r '.clusters | keys[]' config/clusters.yml)
          APPS=$(yq -r '.apps[]' config/trivy-apps.yml)

          # Clone each GitOps repo
          for CLUSTER in $CLUSTERS; do
            REPO=$(yq -r ".clusters.${CLUSTER}.gitops_repo" config/clusters.yml)
            echo "Cloning ${REPO}..."
            git clone --depth 1 --quiet \
              "https://x-access-token:${CICD_TOKEN}@github.com/${REPO}.git" \
              "/tmp/gitops-${CLUSTER}"
          done

          # Walk clusters/namespaces to find deployed image tags
          DEPLOYMENTS="[]"

          for CLUSTER in $CLUSTERS; do
            CLUSTER_PATH=$(yq -r ".clusters.${CLUSTER}.cluster_path" config/clusters.yml)
            GITOPS_REPO=$(yq -r ".clusters.${CLUSTER}.gitops_repo" config/clusters.yml)
            WORKLOADS="/tmp/gitops-${CLUSTER}/${CLUSTER_PATH}"

            [ -d "$WORKLOADS" ] || continue

            for NS_DIR in "$WORKLOADS"/*/; do
              [ -d "$NS_DIR" ] || continue
              NS=$(basename "$NS_DIR")

              for APP in $APPS; do
                VALUES="${NS_DIR}${APP}/${APP}-values.yaml"
                [ -f "$VALUES" ] || continue

                TAG=$(yq -r '.image.tag' "$VALUES")
                [ -n "$TAG" ] && [ "$TAG" != "null" ] || continue

                DEPLOYMENTS=$(echo "$DEPLOYMENTS" | jq \
                  --arg a "$APP" --arg c "$CLUSTER" --arg n "$NS" --arg t "$TAG" \
                  --arg gr "$GITOPS_REPO" --arg cp "$CLUSTER_PATH" \
                  '. + [{"app":$a,"cluster":$c,"namespace":$n,"tag":$t,"gitops_repo":$gr,"cluster_path":$cp}]')
              done
            done
          done

          echo "$DEPLOYMENTS" > /tmp/deployments.json
          DEPLOY_COUNT=$(echo "$DEPLOYMENTS" | jq length)
          echo "Found ${DEPLOY_COUNT} deployments:"
          echo "$DEPLOYMENTS" | jq -r '.[] | "  \(.app) → \(.cluster)/\(.namespace) @ \(.tag)"'

          # Clean up cloned repos (contain access tokens in git config)
          rm -rf /tmp/gitops-*

      - name: Scan images and produce report
        env:
          REGISTRY: ${{ vars.IMAGE_REGISTRY_HOST }}
          TRIVY_IMAGE: ${{ vars.DOCKER_PROXY_HOST }}/aquasec/trivy:latest
          TRIVY_CACHE: ${{ runner.temp }}/trivy-cache
          GHCR_PROXY: ${{ vars.GHCR_PROXY_HOST }}
          SEVERITY: CRITICAL,HIGH
        run: |
          DEPLOYMENTS=$(cat /tmp/deployments.json)
          DEPLOY_COUNT=$(echo "$DEPLOYMENTS" | jq length)

          if [ "$DEPLOY_COUNT" -eq 0 ]; then
            echo "No deployments found."
            echo "> [!NOTE]" >> "$GITHUB_STEP_SUMMARY"
            echo "> No deployed images found to scan." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Get unique app:tag pairs to avoid scanning the same image twice
          echo "$DEPLOYMENTS" | jq -c '[.[] | {app,tag}] | unique | .[]' > /tmp/unique-images.jsonl
          UNIQUE_COUNT=$(wc -l < /tmp/unique-images.jsonl)
          echo "Scanning ${UNIQUE_COUNT} unique images across ${DEPLOY_COUNT} deployments"

          # Scan each unique image
          FIRST_SCAN=true
          while read -r ENTRY; do
            APP=$(echo "$ENTRY" | jq -r '.app')
            TAG=$(echo "$ENTRY" | jq -r '.tag')
            SAFE_KEY=$(echo "${APP}_${TAG}" | tr -c 'a-zA-Z0-9_-' '_')
            IMAGE_REF="${REGISTRY}/krystof-io/${APP}:${TAG}"

            echo "::group::Scanning ${APP}:${TAG}"

            SKIP_FLAGS=""
            if [ "$FIRST_SCAN" = "false" ]; then
              SKIP_FLAGS="--skip-db-update --skip-java-db-update"
            fi
            FIRST_SCAN=false

            set +e
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$HOME/.docker/config.json":/root/.docker/config.json:ro \
              -v "${TRIVY_CACHE}":/root/.cache/trivy \
              -e TRIVY_DB_REPOSITORY="${GHCR_PROXY}/aquasecurity/trivy-db" \
              -e TRIVY_JAVA_DB_REPOSITORY="${GHCR_PROXY}/aquasecurity/trivy-java-db" \
              "${TRIVY_IMAGE}" \
              image --severity "${SEVERITY}" --scanners vuln \
              ${SKIP_FLAGS} \
              --format json "${IMAGE_REF}" > "/tmp/scan-${SAFE_KEY}.json"
            SCAN_EXIT=$?
            set -e

            if [ $SCAN_EXIT -ne 0 ] || [ ! -s "/tmp/scan-${SAFE_KEY}.json" ]; then
              echo "::warning::Scan failed for ${APP}:${TAG}"
              echo '{"Results":[]}' > "/tmp/scan-${SAFE_KEY}.json"
              echo "FAILED" > "/tmp/scan-${SAFE_KEY}.status"
            fi

            echo "::endgroup::"
          done < /tmp/unique-images.jsonl

          # Build the report from deployments + scan results
          SUMMARY_ROWS=""
          DETAILS=""
          TOTAL_ALL=0
          TOTAL_CRITICAL=0
          TOTAL_HIGH=0
          DEPLOYMENTS_WITH_VULNS=0
          DEPLOYMENTS_CLEAN=0
          DEPLOYMENTS_FAILED=0
          # Track which app:tag combos already have detail sections
          DETAILED_KEYS=""

          # Sort deployments: critical first, then high, then clean
          # Process each deployment row
          echo "$DEPLOYMENTS" | jq -c '.[]' > /tmp/deploy-rows.jsonl
          while read -r ROW; do
            APP=$(echo "$ROW" | jq -r '.app')
            CLUSTER=$(echo "$ROW" | jq -r '.cluster')
            NS=$(echo "$ROW" | jq -r '.namespace')
            TAG=$(echo "$ROW" | jq -r '.tag')
            GITOPS_REPO=$(echo "$ROW" | jq -r '.gitops_repo')
            CLUSTER_PATH=$(echo "$ROW" | jq -r '.cluster_path')
            SAFE_KEY=$(echo "${APP}_${TAG}" | tr -c 'a-zA-Z0-9_-' '_')
            SCAN_FILE="/tmp/scan-${SAFE_KEY}.json"

            # Build links
            APP_LINK="[${APP}](https://github.com/krystof-io/${APP})"
            VALUES_PATH="${CLUSTER_PATH}/${NS}/${APP}/${APP}-values.yaml"
            ENV_LINK="[${CLUSTER}/${NS}](https://github.com/${GITOPS_REPO}/blob/main/${VALUES_PATH})"

            # Check for scan failure
            if [ -f "/tmp/scan-${SAFE_KEY}.status" ]; then
              SUMMARY_ROWS+="| :x: | ${APP_LINK} | ${ENV_LINK} | \`${TAG}\` | _scan failed_ | - | - |"$'\n'
              DEPLOYMENTS_FAILED=$((DEPLOYMENTS_FAILED + 1))
              continue
            fi

            # Count vulnerabilities
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$SCAN_FILE")
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$SCAN_FILE")
            APP_TOTAL=$((CRITICAL + HIGH))
            TOTAL_ALL=$((TOTAL_ALL + APP_TOTAL))
            TOTAL_CRITICAL=$((TOTAL_CRITICAL + CRITICAL))
            TOTAL_HIGH=$((TOTAL_HIGH + HIGH))

            # Status icon and summary row
            if [ "$CRITICAL" -gt 0 ]; then
              ICON=":red_circle:"
              DEPLOYMENTS_WITH_VULNS=$((DEPLOYMENTS_WITH_VULNS + 1))
              SUMMARY_ROWS+="| ${ICON} | **${APP_LINK}** | **${ENV_LINK}** | \`${TAG}\` | **${CRITICAL}** | ${HIGH} | **${APP_TOTAL}** |"$'\n'
            elif [ "$HIGH" -gt 0 ]; then
              ICON=":orange_circle:"
              DEPLOYMENTS_WITH_VULNS=$((DEPLOYMENTS_WITH_VULNS + 1))
              SUMMARY_ROWS+="| ${ICON} | **${APP_LINK}** | **${ENV_LINK}** | \`${TAG}\` | ${CRITICAL} | **${HIGH}** | **${APP_TOTAL}** |"$'\n'
            else
              ICON=":green_circle:"
              DEPLOYMENTS_CLEAN=$((DEPLOYMENTS_CLEAN + 1))
              SUMMARY_ROWS+="| ${ICON} | ${APP_LINK} | ${ENV_LINK} | \`${TAG}\` | ${CRITICAL} | ${HIGH} | ${APP_TOTAL} |"$'\n'
            fi

            # Build detail section (once per unique app:tag)
            if [ "$APP_TOTAL" -gt 0 ] && [[ ! "$DETAILED_KEYS" =~ "|${SAFE_KEY}|" ]]; then
              DETAILED_KEYS+="|${SAFE_KEY}|"

              VULN_TABLE=$(jq -r '
                [.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
                | sort_by(if .Severity == "CRITICAL" then 0 else 1 end)
                | .[]
                | "| \(.VulnerabilityID) | \(if .Severity == "CRITICAL" then ":red_circle: CRITICAL" else ":orange_circle: HIGH" end) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "n/a") | \((.Title // "No description") | gsub("\\|"; "/") | .[:80]) |"
              ' "$SCAN_FILE")

              DETAILS+="<details>"$'\n'
              DETAILS+="<summary><strong>${APP}</strong> <code>${TAG}</code> &mdash; ${APP_TOTAL} vulnerabilities (${CRITICAL} critical, ${HIGH} high)</summary>"$'\n'
              DETAILS+=$'\n'
              DETAILS+="| CVE | Severity | Package | Installed | Fixed | Description |"$'\n'
              DETAILS+="|-----|----------|---------|-----------|-------|-------------|"$'\n'
              DETAILS+="${VULN_TABLE}"$'\n'
              DETAILS+=$'\n'"</details>"$'\n\n'
            fi
          done < /tmp/deploy-rows.jsonl

          # Unique app count for the header
          APP_COUNT=$(echo "$DEPLOYMENTS" | jq '[.[].app] | unique | length')

          # Write the full summary
          {
            echo "# :shield: Trivy Nightly Security Scan"
            echo ""
            echo "> **$(date -u '+%Y-%m-%d %H:%M UTC')** | Severity: \`${SEVERITY}\` | **${DEPLOY_COUNT}** deployments across **${APP_COUNT}** applications"
            echo ""

            if [ "$TOTAL_CRITICAL" -gt 0 ]; then
              echo "> [!CAUTION]"
              echo "> **${TOTAL_ALL} vulnerabilities** across **${DEPLOYMENTS_WITH_VULNS}** of **${DEPLOY_COUNT}** deployments (${TOTAL_CRITICAL} critical, ${TOTAL_HIGH} high)"
            elif [ "$TOTAL_HIGH" -gt 0 ]; then
              echo "> [!WARNING]"
              echo "> **${TOTAL_ALL} vulnerabilities** across **${DEPLOYMENTS_WITH_VULNS}** of **${DEPLOY_COUNT}** deployments (${TOTAL_HIGH} high)"
            else
              echo "> [!NOTE]"
              echo "> No vulnerabilities found across **${DEPLOY_COUNT}** deployments"
            fi

            echo ""
            echo "## Overview"
            echo ""
            echo "| Status | Application | Environment | Image Tag | Critical | High | Total |"
            echo "|:------:|-------------|-------------|-----------|:--------:|:----:|:-----:|"
            echo -n "${SUMMARY_ROWS}"

            if [ "$DEPLOYMENTS_WITH_VULNS" -gt 0 ] || [ "$DEPLOYMENTS_FAILED" -gt 0 ]; then
              echo "| | | | **Totals** | **${TOTAL_CRITICAL}** | **${TOTAL_HIGH}** | **${TOTAL_ALL}** |"
            fi

            echo ""

            if [ -n "$DETAILS" ]; then
              echo "## Vulnerability Details"
              echo ""
              echo "${DETAILS}"
            fi

            echo "---"
            echo ""
            echo "<sub>"
            echo ""
            echo ":green_circle: No vulnerabilities &nbsp; :orange_circle: High severity &nbsp; :red_circle: Critical severity &nbsp; :x: Scan failed"
            echo ""
            echo "</sub>"
          } >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "Scan complete. ${DEPLOY_COUNT} deployments scanned, ${TOTAL_ALL} vulnerabilities found."

  cluster-scan:
    name: Cluster Images (${{ matrix.name }})
    needs: discover-clusters
    runs-on: arc-runners-javadev
    strategy:
      matrix: ${{ fromJson(needs.discover-clusters.outputs.matrix) }}
    steps:
      - name: Login to container registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef #v3.6.0
        with:
          registry: ${{ vars.IMAGE_REGISTRY_HOST }}
          username: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
          password: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}

      - name: Pull Trivy image
        run: docker pull ${{ vars.DOCKER_PROXY_HOST }}/aquasec/trivy:latest

      - name: Create Trivy cache directory
        run: mkdir -p ${{ runner.temp }}/trivy-cache

      - name: Setup kubectl
        env:
          CA_CERT: ${{ secrets[format('K8S_CLUSTER_CA_CERT_FOR_{0}_CLUSTER', matrix.name)] }}
          SA_TOKEN: ${{ secrets[format('SERVICE_ACCOUNT_TOKEN_FOR_{0}_CLUSTER_CICD_K8S_ACCESS', matrix.name)] }}
          CLUSTER_URL: ${{ matrix.cluster_url }}
          CLUSTER_NAME: ${{ matrix.name }}
        run: |
          echo "$CA_CERT" | base64 -d > /tmp/ca.crt
          kubectl config set-cluster "${CLUSTER_NAME}" \
            --server="${CLUSTER_URL}" \
            --certificate-authority=/tmp/ca.crt
          kubectl config set-credentials cicd --token="${SA_TOKEN}"
          kubectl config set-context "${CLUSTER_NAME}" \
            --cluster="${CLUSTER_NAME}" \
            --user=cicd
          kubectl config use-context "${CLUSTER_NAME}"

          # Verify we have the only permission we need: list pods cluster-wide
          if ! kubectl auth can-i list pods --all-namespaces; then
            echo "::error::Service account cicd-k8s-access needs cluster-wide 'list pods' permission"
            echo "Minimum ClusterRole needed: apiGroups [''], resources ['pods'], verbs ['list']"
            exit 1
          fi
          echo "Cluster connection verified"

      - name: Discover and scan third-party images
        env:
          REGISTRY: ${{ vars.IMAGE_REGISTRY_HOST }}
          TRIVY_IMAGE: ${{ vars.DOCKER_PROXY_HOST }}/aquasec/trivy:latest
          TRIVY_CACHE: ${{ runner.temp }}/trivy-cache
          GHCR_PROXY: ${{ vars.GHCR_PROXY_HOST }}
          SEVERITY: CRITICAL,HIGH
          CLUSTER_NAME: ${{ matrix.name }}
        run: |
          # Get all images with workload context (namespace, app label, owner)
          kubectl get pods --all-namespaces -o json | jq -c '
            [.items[] |
              .metadata.namespace as $ns |
              (.metadata.labels["app.kubernetes.io/name"] // .metadata.labels["app"] // .metadata.labels["app.kubernetes.io/component"] // .metadata.ownerReferences[0].name // .metadata.name) as $workload |
              ((.spec.containers // [])[], (.spec.initContainers // [])[]) |
              {image: .image, namespace: $ns, workload: $workload}
            ]' > /tmp/all-pod-images.json

          ALL_COUNT=$(jq '[.[].image] | unique | length' /tmp/all-pod-images.json)
          echo "Found ${ALL_COUNT} unique images in ${CLUSTER_NAME} cluster"

          # Filter out our app images, then group by image with "used by" context
          jq -c '
            [.[] | select(.image | contains("krystof-io/") | not)] |
            group_by(.image) |
            map({
              image: .[0].image,
              used_by: ([.[] | "\(.namespace)/\(.workload)"] | unique | join(", "))
            }) |
            sort_by(.image) |
            .[]
          ' /tmp/all-pod-images.json > /tmp/third-party-images.jsonl

          IMAGE_COUNT=$(wc -l < /tmp/third-party-images.jsonl)
          echo "Third-party images to scan: ${IMAGE_COUNT} (excluded $(( ALL_COUNT - IMAGE_COUNT )) app images)"

          if [ "$IMAGE_COUNT" -eq 0 ]; then
            echo "> [!NOTE]" >> "$GITHUB_STEP_SUMMARY"
            echo "> No third-party images found in **${CLUSTER_NAME}** cluster." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Scan each image
          FIRST_SCAN=true
          SUMMARY_ROWS=""
          DETAILS=""
          TOTAL_ALL=0
          TOTAL_CRITICAL=0
          TOTAL_HIGH=0
          IMAGES_WITH_VULNS=0
          IMAGES_CLEAN=0
          IMAGES_FAILED=0

          while read -r ENTRY; do
            IMAGE_REF=$(echo "$ENTRY" | jq -r '.image')
            USED_BY=$(echo "$ENTRY" | jq -r '.used_by')
            [ -n "$IMAGE_REF" ] || continue
            SAFE_KEY=$(echo "$IMAGE_REF" | tr -c 'a-zA-Z0-9_-' '_')

            # Clean display name: strip registry prefix, keep image:tag
            DISPLAY_NAME=$(echo "$IMAGE_REF" | sed 's|^[^/]*\.[^/]*/||; s|^library/||')

            echo "::group::Scanning ${IMAGE_REF} (${USED_BY})"

            SKIP_FLAGS=""
            if [ "$FIRST_SCAN" = "false" ]; then
              SKIP_FLAGS="--skip-db-update --skip-java-db-update"
            fi
            FIRST_SCAN=false

            set +e
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$HOME/.docker/config.json":/root/.docker/config.json:ro \
              -v "${TRIVY_CACHE}":/root/.cache/trivy \
              -e TRIVY_DB_REPOSITORY="${GHCR_PROXY}/aquasecurity/trivy-db" \
              -e TRIVY_JAVA_DB_REPOSITORY="${GHCR_PROXY}/aquasecurity/trivy-java-db" \
              "${TRIVY_IMAGE}" \
              image --severity "${SEVERITY}" --scanners vuln \
              ${SKIP_FLAGS} \
              --format json "${IMAGE_REF}" > "/tmp/scan-${SAFE_KEY}.json" 2>/dev/null
            SCAN_EXIT=$?
            set -e

            echo "::endgroup::"

            if [ $SCAN_EXIT -ne 0 ] || [ ! -s "/tmp/scan-${SAFE_KEY}.json" ]; then
              SUMMARY_ROWS+="| :x: | ${DISPLAY_NAME} | ${USED_BY} | _scan failed_ | - | - |"$'\n'
              IMAGES_FAILED=$((IMAGES_FAILED + 1))
              continue
            fi

            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "/tmp/scan-${SAFE_KEY}.json")
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "/tmp/scan-${SAFE_KEY}.json")
            IMG_TOTAL=$((CRITICAL + HIGH))
            TOTAL_ALL=$((TOTAL_ALL + IMG_TOTAL))
            TOTAL_CRITICAL=$((TOTAL_CRITICAL + CRITICAL))
            TOTAL_HIGH=$((TOTAL_HIGH + HIGH))

            if [ "$CRITICAL" -gt 0 ]; then
              ICON=":red_circle:"
              IMAGES_WITH_VULNS=$((IMAGES_WITH_VULNS + 1))
              SUMMARY_ROWS+="| ${ICON} | **${DISPLAY_NAME}** | ${USED_BY} | **${CRITICAL}** | ${HIGH} | **${IMG_TOTAL}** |"$'\n'
            elif [ "$HIGH" -gt 0 ]; then
              ICON=":orange_circle:"
              IMAGES_WITH_VULNS=$((IMAGES_WITH_VULNS + 1))
              SUMMARY_ROWS+="| ${ICON} | **${DISPLAY_NAME}** | ${USED_BY} | ${CRITICAL} | **${HIGH}** | **${IMG_TOTAL}** |"$'\n'
            else
              ICON=":green_circle:"
              IMAGES_CLEAN=$((IMAGES_CLEAN + 1))
              SUMMARY_ROWS+="| ${ICON} | ${DISPLAY_NAME} | ${USED_BY} | ${CRITICAL} | ${HIGH} | ${IMG_TOTAL} |"$'\n'
            fi

            # Collapsible detail section
            if [ "$IMG_TOTAL" -gt 0 ]; then
              VULN_TABLE=$(jq -r '
                [.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
                | sort_by(if .Severity == "CRITICAL" then 0 else 1 end)
                | .[]
                | "| \(.VulnerabilityID) | \(if .Severity == "CRITICAL" then ":red_circle: CRITICAL" else ":orange_circle: HIGH" end) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "n/a") | \((.Title // "No description") | gsub("\\|"; "/") | .[:80]) |"
              ' "/tmp/scan-${SAFE_KEY}.json")

              DETAILS+="<details>"$'\n'
              DETAILS+="<summary><strong>${DISPLAY_NAME}</strong> &mdash; ${IMG_TOTAL} vulnerabilities (${CRITICAL} critical, ${HIGH} high)</summary>"$'\n'
              DETAILS+=$'\n'
              DETAILS+="| CVE | Severity | Package | Installed | Fixed | Description |"$'\n'
              DETAILS+="|-----|----------|---------|-----------|-------|-------------|"$'\n'
              DETAILS+="${VULN_TABLE}"$'\n'
              DETAILS+=$'\n'"</details>"$'\n\n'
            fi
          done < /tmp/third-party-images.jsonl

          # Write summary
          {
            echo "# :package: Third-Party Image Scan: ${CLUSTER_NAME} cluster"
            echo ""
            echo "> **$(date -u '+%Y-%m-%d %H:%M UTC')** | Severity: \`${SEVERITY}\` | **${IMAGE_COUNT}** third-party images"
            echo ""

            if [ "$TOTAL_CRITICAL" -gt 0 ]; then
              echo "> [!CAUTION]"
              echo "> **${TOTAL_ALL} vulnerabilities** across **${IMAGES_WITH_VULNS}** of **${IMAGE_COUNT}** images (${TOTAL_CRITICAL} critical, ${TOTAL_HIGH} high)"
            elif [ "$TOTAL_HIGH" -gt 0 ]; then
              echo "> [!WARNING]"
              echo "> **${TOTAL_ALL} vulnerabilities** across **${IMAGES_WITH_VULNS}** of **${IMAGE_COUNT}** images (${TOTAL_HIGH} high)"
            else
              echo "> [!NOTE]"
              echo "> No vulnerabilities found across **${IMAGE_COUNT}** third-party images"
            fi

            echo ""
            echo "## Overview"
            echo ""
            echo "| Status | Image | Used By | Critical | High | Total |"
            echo "|:------:|-------|---------|:--------:|:----:|:-----:|"
            echo -n "${SUMMARY_ROWS}"

            if [ "$IMAGES_WITH_VULNS" -gt 0 ] || [ "$IMAGES_FAILED" -gt 0 ]; then
              echo "| | | **Totals** | **${TOTAL_CRITICAL}** | **${TOTAL_HIGH}** | **${TOTAL_ALL}** |"
            fi

            echo ""

            if [ -n "$DETAILS" ]; then
              echo "## Vulnerability Details"
              echo ""
              echo "${DETAILS}"
            fi

            echo "---"
            echo ""
            echo "<sub>"
            echo ""
            echo ":green_circle: No vulnerabilities &nbsp; :orange_circle: High severity &nbsp; :red_circle: Critical severity &nbsp; :x: Scan failed"
            echo ""
            echo "</sub>"
          } >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "Cluster scan complete. ${IMAGE_COUNT} images scanned, ${TOTAL_ALL} vulnerabilities found."
