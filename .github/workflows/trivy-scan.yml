name: Trivy Container Image Scan

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
        description: 'Application name (used to construct image reference)'
      image_tag:
        required: false
        type: string
        default: ''
        description: 'Image tag to scan. If empty, discovers the latest tag from the registry.'
      severity:
        required: false
        type: string
        default: 'CRITICAL,HIGH'
        description: 'Comma-separated list of severities to report (CRITICAL, HIGH, MEDIUM, LOW, UNKNOWN)'
      fail_on_vulnerabilities:
        required: false
        type: boolean
        default: false
        description: 'Whether to fail the workflow if vulnerabilities are found'
    secrets:
      IMAGE_REGISTRY_USERNAME:
        required: true
      IMAGE_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Trivy Image Scan
    runs-on: arc-runners-javadev
    steps:
      - name: Login to container registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef #v3.6.0
        with:
          registry: ${{ vars.IMAGE_REGISTRY_HOST }}
          username: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
          password: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}

      - name: Discover latest image tag
        if: inputs.image_tag == ''
        id: discover-tag
        env:
          REGISTRY: ${{ vars.IMAGE_REGISTRY_HOST }}
          APP_NAME: ${{ inputs.app_name }}
          REG_USERNAME: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
          REG_PASSWORD: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}
        run: |
          set -e
          AUTH=$(echo -n "${REG_USERNAME}:${REG_PASSWORD}" | base64)
          RESPONSE=$(curl -sf -H "Authorization: Basic ${AUTH}" \
            "https://${REGISTRY}/v2/krystof-io/${APP_NAME}/tags/list")
          TAG=$(echo "$RESPONSE" | jq -r '.tags[]' | sort -V | tail -1)
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::No tags found for krystof-io/${APP_NAME} in ${REGISTRY}"
            exit 1
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Discovered latest tag: ${TAG}"

      - name: Set image reference
        id: image-ref
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ steps.discover-tag.outputs.tag }}"
          fi
          IMAGE_REF="${{ vars.IMAGE_REGISTRY_HOST }}/krystof-io/${{ inputs.app_name }}:${TAG}"
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Scanning image: ${IMAGE_REF}"

      - name: Pull Trivy image
        run: docker pull ${{ vars.DOCKER_PROXY_HOST }}/aquasec/trivy:latest

      - name: Run Trivy vulnerability scanner (table)
        id: trivy-table
        env:
          IMAGE_REF: ${{ steps.image-ref.outputs.image_ref }}
          SEVERITY: ${{ inputs.severity }}
          TRIVY_IMAGE: ${{ vars.DOCKER_PROXY_HOST }}/aquasec/trivy:latest
          FAIL_ON_VULN: ${{ inputs.fail_on_vulnerabilities }}
        run: |
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.docker/config.json:/root/.docker/config.json:ro \
            "${TRIVY_IMAGE}" \
            image --severity "${SEVERITY}" --scanners vuln \
            --format table "${IMAGE_REF}" | tee trivy-results.txt
          SCAN_EXIT=$?
          set -e

          if [ "$FAIL_ON_VULN" = "true" ] && [ $SCAN_EXIT -ne 0 ]; then
            echo "::error::Trivy found vulnerabilities"
            exit 1
          fi

      - name: Run Trivy vulnerability scanner (SARIF)
        if: always()
        env:
          IMAGE_REF: ${{ steps.image-ref.outputs.image_ref }}
          SEVERITY: ${{ inputs.severity }}
          TRIVY_IMAGE: ${{ vars.DOCKER_PROXY_HOST }}/aquasec/trivy:latest
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.docker/config.json:/root/.docker/config.json:ro \
            -v $(pwd):/output \
            "${TRIVY_IMAGE}" \
            image --severity "${SEVERITY}" --scanners vuln \
            --format sarif --output /output/trivy-results.sarif \
            "${IMAGE_REF}"

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Add scan results to step summary
        if: always()
        env:
          IMAGE_REF: ${{ steps.image-ref.outputs.image_ref }}
          SEVERITY: ${{ inputs.severity }}
        run: |
          echo "## Trivy Container Image Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${IMAGE_REF}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Severity filter**: ${SEVERITY}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.txt ] && [ -s trivy-results.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No vulnerabilities found matching the severity filter." >> $GITHUB_STEP_SUMMARY
          fi
