name: Nightly NVD Cache Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-nvd-cache:
    runs-on: arc-runners-javadev
    steps:
      - name: Compute cache key
        id: cache-keys
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Initialize Maven settings
        uses: s4u/maven-settings-action@v4.0.0
        with:
          mirrors: |
            [
            {"id": "nexus", "name":"nexus", "mirrorOf":"*", "url":"${{ vars.MAVEN_REPO_URL }}"}
            ]

      - name: Restore existing NVD cache
        uses: krystof-io/cache@v5.0.5-1.0.0
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-data-${{ steps.cache-keys.outputs.date }}
          restore-keys: |
            owasp-nvd-data-
        env:
          RUNS_ON_S3_BUCKET_CACHE: 'runner-caches'
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_CACHE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_CACHE_SECRET_KEY }}
          RUNS_ON_S3_BUCKET_ENDPOINT: ${{ vars.S3_CACHE_ENDPOINT }}
          RUNS_ON_AWS_REGION: ${{ vars.S3_CACHE_REGION }}
          RUNS_ON_S3_FORCE_PATH_STYLE: 'true'
          RUNS_ON_GLOBAL_CACHE_PREFIX: 'cache-global'

      - name: Create minimal Maven project
        run: |
          mkdir -p /tmp/nvd-updater
          cat > /tmp/nvd-updater/pom.xml << 'POMEOF'
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>io.krystof</groupId>
            <artifactId>nvd-cache-updater</artifactId>
            <version>1.0.0</version>
          </project>
          POMEOF

      - name: Update NVD database
        # Overall safety cap: a healthy incremental update finishes in well under
        # a minute; a full re-pull takes ~15-30 min but can run longer when NVD is
        # slow. Allow up to 2 hours so a sluggish-but-recovering NVD endpoint has
        # room to complete a full pull (including a retry) instead of being killed.
        timeout-minutes: 120
        run: |
          # NVD's API (fronted by Cloudflare) intermittently returns HTTP 524
          # ("origin timeout") partway through the large full-dataset pull, which
          # fails the whole update. Retry a couple of times so a transient outage
          # doesn't break the nightly job, giving each attempt a generous window
          # and pausing between tries to let NVD's backend recover.
          attempts=2
          retry_delay=90
          attempt_timeout=55m
          for i in $(seq 1 "$attempts"); do
            echo "::group::NVD update attempt $i/$attempts"
            if timeout "$attempt_timeout" mvn -f /tmp/nvd-updater/pom.xml \
                 org.owasp:dependency-check-maven:12.2.2:update-only \
                 -DnvdApiDelay=2000 \
                 -DnvdApiKey="$NVD_API_KEY"; then
              echo "::endgroup::"
              echo "NVD update succeeded on attempt $i."
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::NVD update attempt $i/$attempts failed."
            if [ "$i" -lt "$attempts" ]; then
              echo "Waiting ${retry_delay}s before retrying..."
              sleep "$retry_delay"
            fi
          done
          echo "::error::NVD update failed after $attempts attempts." >&2
          exit 1
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

