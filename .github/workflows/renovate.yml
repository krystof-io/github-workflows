name: Renovate (org)
# Single self-hosted Renovate job that autodiscovers and processes every repo
# the Renovate GitHub App is installed on. App repos need no Renovate files of
# their own; shared policy lives in config/renovate-global.json.
#
# Reusable only: the schedule/dispatch trigger lives in a private repo
# so the run report (which lists
# private repo names) stays in a private repo rather than this public one.
on:
  workflow_call:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        type: string
      dryRun:
        description: Dry run (no PRs/branches/issues written) — opt-in for debugging
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: renovate-org
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: arc-runners-javadev
    env:
      RENOVATE_IMAGE: ${{ vars.DOCKER_PROXY_HOST }}/renovate/renovate:41
    steps:
      # Check out THIS repo (not the calling repo) to get the global config.
      # Pinned because the caller lives in a different (private) repo, so the
      # default checkout would otherwise pull the caller and miss the config.
      - name: Checkout github-workflows (for renovate config)
        uses: actions/checkout@v5
        with:
          repository: krystof-io/github-workflows
          ref: main

      # Org-scoped token: pass owner and omit `repositories` so the installation
      # token covers every repo the App can access — required for autodiscover.
      - name: Generate org-scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Pull Renovate image
        run: docker pull "${RENOVATE_IMAGE}"

      # Config is passed via RENOVATE_CONFIG (the file's contents) rather than a
      # bind mount, so it needs no host-path assumptions about the runner.
      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          IS_DRY_RUN: ${{ inputs.dryRun }}
        run: |
          DRY=""
          if [ "${IS_DRY_RUN}" = "true" ]; then
            DRY="-e RENOVATE_DRY_RUN=full"
          fi
          # World-writable so the non-root Renovate container user can write the
          # report into the bind mount (otherwise the write fails with EACCES).
          mkdir -p "${RUNNER_TEMP}/renovate-report"
          chmod 777 "${RUNNER_TEMP}/renovate-report"
          # reportType/reportPath are experimental self-hosted options; they write
          # a JSON summary of the whole autodiscover run (every repo, its branches
          # and upgrades). Mounted out of the container since we run with --rm.
          docker run --rm \
            -e RENOVATE_TOKEN \
            -e RENOVATE_PLATFORM=github \
            -e RENOVATE_CONFIG="$(cat config/renovate-global.json)" \
            -e RENOVATE_REPORT_TYPE=file \
            -e RENOVATE_REPORT_PATH=/tmp/report/renovate-report.json \
            -e RENOVATE_REPORT_FORMATTING=true \
            -e LOG_LEVEL \
            ${DRY} \
            -v "${RUNNER_TEMP}/renovate-report:/tmp/report" \
            "${RENOVATE_IMAGE}"

      # Surface the run summary in the job page. The JSON shape is experimental,
      # so keep this best-effort and rely on the uploaded artifact for full detail.
      - name: Render report to step summary
        if: always()
        env:
          REPORT: ${{ runner.temp }}/renovate-report/renovate-report.json
          BASE: ${{ github.server_url }}
        run: |
          if [ ! -f "${REPORT}" ]; then
            echo "No Renovate report produced." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          {
            echo "## Renovate run report"
            echo ""
            jq -r --arg base "${BASE}" '
              [.repositories[].branches[]?] as $b
              | "_\(.repositories|length) repos scanned · "
                + "\([$b[]|select(.prNo!=null)]|length) open PRs · "
                + "\([$b[]|select(.result=="needs-approval")]|length) awaiting dashboard approval · "
                + "\([$b[]|select(.result=="not-scheduled")]|length) pending (off-schedule)_"
            ' "${REPORT}"

            # Actionable: branches that have a real PR (linked).
            echo ""
            echo "### Open PRs"
            echo "| Repository | PR | Type |"
            echo "|---|---|---|"
            jq -r --arg base "${BASE}" '
              .repositories | to_entries[] | .key as $r
              | .value.branches[]?
              | select(.prNo != null)
              | "| [\($r)](\($base)/\($r)) "
                + "| [\(.prTitle | gsub("\\|"; "\\|"))](\($base)/\($r)/pull/\(.prNo)) "
                + "| \((.upgrades[0].updateType) // "-") |"
            ' "${REPORT}" || echo "| _(none)_ | | |"

            # Rollup: one row per repo that has any pending work (repo linked).
            echo ""
            echo "### Per-repo summary"
            echo "| Repository | Open PRs | Needs approval | Pending |"
            echo "|---|---|---|---|"
            jq -r --arg base "${BASE}" '
              .repositories | to_entries[]
              | select(.value.branches | length > 0)
              | .key as $r | .value.branches as $b
              | "| [\($r)](\($base)/\($r)) "
                + "| \([$b[]|select(.result=="pr-created" or .result=="done")]|length) "
                + "| \([$b[]|select(.result=="needs-approval")]|length) "
                + "| \([$b[]|select(.result=="not-scheduled")]|length) |"
            ' "${REPORT}" || echo "| _(none)_ | | | |"

            # Problems (e.g. private-registry lookup failures), repo linked.
            if [ "$(jq '[.repositories[].problems[]?] | length' "${REPORT}")" -gt 0 ]; then
              echo ""
              echo "### Problems"
              echo "| Repository | Problem |"
              echo "|---|---|"
              jq -r --arg base "${BASE}" '
                .repositories | to_entries[] | .key as $r
                | .value.problems[]?
                | "| [\($r)](\($base)/\($r)) | \(.msg): \((.warnings // [.msg]) | join("; ") | gsub("\\|"; "\\|")) |"
              ' "${REPORT}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: renovate-report
          path: ${{ runner.temp }}/renovate-report/renovate-report.json
          if-no-files-found: warn
