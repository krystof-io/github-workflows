name: Renovate (org)
# Single self-hosted Renovate job that autodiscovers and processes every repo
# the Renovate GitHub App is installed on. App repos need no Renovate files of
# their own; shared policy lives in config/renovate-global.json.
on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        type: choice
        options:
          - debug
          - info
          - warn
      dryRun:
        description: Dry run (no PRs/branches/issues written) — opt-in for debugging
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: renovate-org
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: arc-runners-javadev
    env:
      RENOVATE_IMAGE: ${{ vars.DOCKER_PROXY_HOST }}/renovate/renovate:41
    steps:
      # The global config file lives in this repo, so check it out.
      - name: Checkout
        uses: actions/checkout@v5

      # Org-scoped token: pass owner and omit `repositories` so the installation
      # token covers every repo the App can access — required for autodiscover.
      - name: Generate org-scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Pull Renovate image
        run: docker pull "${RENOVATE_IMAGE}"

      # Config is passed via RENOVATE_CONFIG (the file's contents) rather than a
      # bind mount, so it needs no host-path assumptions about the runner.
      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          IS_DRY_RUN: ${{ inputs.dryRun }}
        run: |
          DRY=""
          if [ "${IS_DRY_RUN}" = "true" ]; then
            DRY="-e RENOVATE_DRY_RUN=full"
          fi
          # World-writable so the non-root Renovate container user can write the
          # report into the bind mount (otherwise the write fails with EACCES).
          mkdir -p "${RUNNER_TEMP}/renovate-report"
          chmod 777 "${RUNNER_TEMP}/renovate-report"
          # reportType/reportPath are experimental self-hosted options; they write
          # a JSON summary of the whole autodiscover run (every repo, its branches
          # and upgrades). Mounted out of the container since we run with --rm.
          docker run --rm \
            -e RENOVATE_TOKEN \
            -e RENOVATE_PLATFORM=github \
            -e RENOVATE_CONFIG="$(cat config/renovate-global.json)" \
            -e RENOVATE_REPORT_TYPE=file \
            -e RENOVATE_REPORT_PATH=/tmp/report/renovate-report.json \
            -e RENOVATE_REPORT_FORMATTING=true \
            -e LOG_LEVEL \
            ${DRY} \
            -v "${RUNNER_TEMP}/renovate-report:/tmp/report" \
            "${RENOVATE_IMAGE}"

      # Surface the run summary in the job page. The JSON shape is experimental,
      # so keep this best-effort and rely on the uploaded artifact for full detail.
      - name: Render report to step summary
        if: always()
        env:
          REPORT: ${{ runner.temp }}/renovate-report/renovate-report.json
        run: |
          if [ ! -f "${REPORT}" ]; then
            echo "No Renovate report produced." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          {
            echo "## Renovate run report"
            echo ""
            echo "| Repository | Branch | Update |"
            echo "|---|---|---|"
            jq -r '
              .repositories | to_entries[] as $r
              | $r.value.branches[]? as $b
              | $b.upgrades[]?
              | "| \($r.key) | \($b.branchName) | \(.depName) \(.currentVersion) → \(.newVersion // .newValue) |"
            ' "${REPORT}" || echo "| _(could not parse report; see artifact)_ | | |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renovate-report
          path: ${{ runner.temp }}/renovate-report/renovate-report.json
          if-no-files-found: warn
