# CI/CD workflow for a Java library
# Location: Library repository at .github/workflows/build.yml
#
# This is the ONLY build workflow file needed in your library repository.
# The shared workflow handles building, testing, SonarQube analysis,
# SNAPSHOT publishing (automatic for SNAPSHOT versions), and
# release publishing (triggered by v* tags, requires passing SonarQube).

name: CI/CD Pipeline

on:
  push:
    branches:
      - "*"
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-publish:
    # Call the shared workflow for Java libraries
    uses: krystof-io/github-workflows/.github/workflows/java-lib-build.yml@main
    with:
      # Optional: Customize as needed (these show non-default values)
      java_version: '25'                    # Default: '25'
      # maven_profiles: 'extra'             # Default: ''

    secrets: inherit
